<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Noticias</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .news-card { border: 1px solid #ccc; padding: 10px; margin: 10px; cursor: pointer; }
    #news-detail { display: none; border: 2px solid black; padding: 20px; }
  </style>
</head>
<body>

<h1>Noticias</h1>

<div id="news-container"></div>

<div id="news-detail"></div>

<hr>

<h2>Panel Admin</h2>

<input id="titulo" placeholder="Título"><br><br>
<input id="autor" placeholder="Autor"><br><br>
<textarea id="contenido" placeholder="Contenido"></textarea><br><br>
<button onclick="addNews()">Publicar</button>

<script type="module">

// 🔥 IMPORTS FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, addDoc, getDocs, doc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 CONFIG (PON LA TUYA)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMAIN",
  projectId: "TU_PROJECT_ID",
};

// 🚀 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📰 AÑADIR NOTICIA
window.addNews = async function() {
  const titulo = document.getElementById("titulo").value;
  const contenido = document.getElementById("contenido").value;
  const autor = document.getElementById("autor").value;

  await addDoc(collection(db, "noticias"), {
    titulo,
    contenido,
    autor,
    fecha: new Date()
  });

  alert("Noticia publicada");
  loadNews();
};

// 📥 CARGAR NOTICIAS
async function loadNews() {
  const querySnapshot = await getDocs(collection(db, "noticias"));
  const container = document.getElementById("news-container");
  container.innerHTML = "";

  querySnapshot.forEach((docu) => {
    const noticia = docu.data();

    container.innerHTML += `
      <div class="news-card" onclick="openNews('${docu.id}')">
        <h3>${noticia.titulo}</h3>
        <p>${noticia.autor || "Sin autor"}</p>
      </div>
    `;
  });
}

// 🔍 ABRIR NOTICIA
window.openNews = async function(id) {
  const docRef = doc(db, "noticias", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const n = docSnap.data();

    const url = window.location.href + "?id=" + id;

    document.getElementById("news-detail").style.display = "block";

    document.getElementById("news-detail").innerHTML = `
      <button onclick="closeNews()">← Volver</button>
      <h1>${n.titulo}</h1>
      <p><strong>Autor:</strong> ${n.autor || "Desconocido"}</p>
      <p>${n.contenido}</p>

      <hr>

      <button onclick="shareFacebook('${url}')">Compartir Facebook</button>
      <button onclick="copyLink('${url}')">Copiar enlace</button>
    `;
  }
};

// ❌ CERRAR
window.closeNews = function() {
  document.getElementById("news-detail").style.display = "none";
};

// 📘 FACEBOOK
window.shareFacebook = function(url) {
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
};

// 🔗 COPIAR LINK
window.copyLink = function(url) {
  navigator.clipboard.writeText(url);
  alert("Enlace copiado");
};

// 🚀 INICIO
loadNews();

</script>

</body>
</html>
