backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "noticias"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Imagen", name: "image", widget: "image"}
      - {label: "Contenido", name: "body", widget: "markdown"}

  - name: "eventos"
    label: "Eventos"
    folder: "eventos"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nombre", name: "title", widget: "string"}
      - {label: "Fecha", name: "date", widget: "datetime"}
      - {label: "Lugar", name: "lugar", widget: "string"}
      - {label: "Cartel", name: "image", widget: "image"}
